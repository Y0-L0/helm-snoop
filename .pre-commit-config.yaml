repos:
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --timeout 5m --fix
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
        files: \.go$
